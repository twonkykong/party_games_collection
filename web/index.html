<!DOCTYPE html>
<html>
<head>
  <base href="/party_games_collection/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Локальный PWA-сборник игр для компании.">
  <meta name="theme-color" content="#F4E7D8">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Сборник игр">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Сборник игр</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #FFF7F0;
    }

    .platform-ios html,
    .platform-ios body,
    html.platform-ios,
    body.platform-ios {
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: auto;
    }

    .platform-ios flutter-view,
    .platform-ios flt-glass-pane,
    .platform-ios flt-scene-host {
      overscroll-behavior: none;
    }

    flt-semantics-placeholder {
      pointer-events: none !important;
    }

    #app-status-bar-cover {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: env(safe-area-inset-top, 0px);
      background: #FFF7F0;
      pointer-events: none;
      z-index: 2147483647;
    }

    @supports (height: constant(safe-area-inset-top)) {
      #app-status-bar-cover {
        height: constant(safe-area-inset-top);
      }
    }
  </style>
</head>

<body>
  <div id="app-status-bar-cover" aria-hidden="true"></div>

  <script>
    (function () {
      var userAgent = navigator.userAgent || '';
      var isIOS = /iPhone|iPad|iPod/i.test(userAgent) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      var lightColor = '#FFF7F0';
      var darkColor = '#171211';
      if (isIOS) {
        document.documentElement.classList.add('platform-ios');
        document.body.classList.add('platform-ios');
      }

      function readThemePreference() {
        try {
          var raw = window.localStorage.getItem('flutter.theme_preference');
          if (!raw) return 'system';
          return JSON.parse(raw);
        } catch (_) {
          return 'system';
        }
      }

      function resolveDarkMode(preference) {
        if (preference === 'dark') return true;
        if (preference === 'light') return false;
        return window.matchMedia &&
          window.matchMedia('(prefers-color-scheme: dark)').matches;
      }

      function applyChrome() {
        var preference = readThemePreference();
        var isDark = resolveDarkMode(preference);
        var color = isDark ? darkColor : lightColor;

        var themeMeta = document.querySelector('meta[name="theme-color"]');
        if (themeMeta) {
          themeMeta.setAttribute('content', color);
        }

        document.documentElement.style.backgroundColor = color;
        document.body.style.backgroundColor = color;

        var statusCover = document.getElementById('app-status-bar-cover');
        if (statusCover) {
          statusCover.style.backgroundColor = color;
        }
      }

      function ensureViewportFitCover() {
        var viewport = document.querySelector('meta[name="viewport"]');
        if (!viewport) {
          viewport = document.createElement('meta');
          viewport.setAttribute('name', 'viewport');
          document.head.appendChild(viewport);
        }

        var content = viewport.getAttribute('content') || 'width=device-width, initial-scale=1';
        if (content.indexOf('viewport-fit=cover') === -1) {
          viewport.setAttribute('content', content + ', viewport-fit=cover');
        }
      }

      applyChrome();
      ensureViewportFitCover();

      var headObserver = new MutationObserver(function () {
        ensureViewportFitCover();
      });
      headObserver.observe(document.head, {
        attributes: true,
        childList: true,
        subtree: true,
        attributeFilter: ['content']
      });
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
