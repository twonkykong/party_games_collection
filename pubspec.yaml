name: party_games_collection
description: "Party games collection PWA MVP."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  audioplayers: ^6.4.0
  web: ^1.1.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/alias_words_ultra.json
    - assets/data/bunker_ultra.json
    - assets/data/mafia_roles_ultra.json
    - assets/data/people_lists_update.json
    - assets/data/spy_words_ultra.json
    - assets/data/spy_hints_people_update.json
    - assets/data/whoami_words_ultra.json
    - assets/audio/ui/card_hide.wav
    - assets/audio/ui/card_reveal.wav
    - assets/audio/ui/error_soft.wav
    - assets/audio/ui/picker_tick.wav
    - assets/audio/ui/success_soft.wav
    - assets/audio/ui/tap_soft.wav
    - assets/audio/ui/toggle_soft.wav
