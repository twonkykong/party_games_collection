<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/party_games_collection/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Локальный PWA-сборник игр для компании.">
  <meta name="theme-color" content="#F4E7D8">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Сборник игр">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Сборник игр</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      background: #FFF7F0;
    }
  </style>
</head>
<body>
  <script>
    (function () {
      var lightColor = '#FFF7F0';
      var darkColor = '#171211';
      var lightStatusBar = 'default';
      var darkStatusBar = 'black-translucent';

      function readThemePreference() {
        try {
          var raw = window.localStorage.getItem('flutter.theme_preference');
          if (!raw) return 'system';
          return JSON.parse(raw);
        } catch (_) {
          return 'system';
        }
      }

      function resolveDarkMode(preference) {
        if (preference === 'dark') return true;
        if (preference === 'light') return false;
        return window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
      }

      function applyChrome() {
        var preference = readThemePreference();
        var isDark = resolveDarkMode(preference);
        var color = isDark ? darkColor : lightColor;
        var statusBarStyle = isDark ? darkStatusBar : lightStatusBar;

        var themeMeta = document.querySelector('meta[name="theme-color"]');
        if (themeMeta) {
          themeMeta.setAttribute('content', color);
        }

        var statusMeta = document.querySelector(
          'meta[name="apple-mobile-web-app-status-bar-style"]',
        );
        if (statusMeta) {
          statusMeta.setAttribute('content', statusBarStyle);
        }

        document.documentElement.style.backgroundColor = color;
        document.body.style.backgroundColor = color;
      }

      applyChrome();
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
